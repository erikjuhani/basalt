[input_modal]
key_bindings = [
 { key = "w", command = "input_modal_word_forward" },
 { key = "b", command = "input_modal_word_backward" },
]

[note_editor]
key_bindings = [
  { key = "gg", command = "note_editor_scroll_to_top" },
  { key = "G",  command = "note_editor_scroll_to_bottom" },
]

[explorer]
key_bindings = [
  { key = "gg", command = "explorer_scroll_to_top" },
  { key = "G",  command = "explorer_scroll_to_bottom" },
]

[outline]
key_bindings = [
  { key = "gg", command = "explorer_scroll_to_top" },
  { key = "G",  command = "explorer_scroll_to_bottom" },
]
