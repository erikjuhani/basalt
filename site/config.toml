base_url = "https://erikjuhani.github.io/basalt"
title = "basalt"
description = "TUI to manage Obsidian vaults and notes from the terminal."
default_language = "en"
compile_sass = true
build_search_index = true
generate_feeds = false

[markdown]
render_emoji = false
external_links_target_blank = true
smart_punctuation = false
bottom_footnotes = true

[search]
include_title = true
include_description = true
include_content = true
truncate_content_length = 200

[extra]
github_url = "https://github.com/erikjuhani/basalt"
releases_url = "https://github.com/erikjuhani/basalt/releases"
basalt_version = "0.12.4"
